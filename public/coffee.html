<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#5C4033" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Coffee Tracker" />
  <title>Coffee Machine Service Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FAF6F1; overflow-x: hidden; -webkit-font-smoothing: antialiased; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ============================================================
// COFFEE MACHINE SERVICE TRACKER
// Warm brown/cream aesthetic
// ============================================================

const COLORS = {
  bg: "#FAF6F1",
  card: "#FFFFFF",
  cardBorder: "#E8E0D8",
  accent: "#5C4033",
  accentLight: "#8B6F5E",
  accentLighter: "#D4C4B0",
  text: "#3C2A1E",
  textSecondary: "#8B7D72",
  textMuted: "#B8ADA3",
  headerText: "#5C4033",
  activeTab: "#5C4033",
  activeTabBg: "#5C403310",
  tabBorder: "#5C4033",
  danger: "#C0392B",
  success: "#27AE60",
  inputBg: "#F5F0EB",
  inputBorder: "#DDD5CC",
  tableDivider: "#EDE7E0",
};

// ============================================================
// STORAGE
// ============================================================
const STORAGE_KEYS = {
  entries: "coffee-tracker-entries",
  clients: "coffee-tracker-clients",
};

function loadData(key, fallback) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : fallback;
  } catch { return fallback; }
}

function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); }
  catch (e) { console.error("Storage error:", e); }
}

// ============================================================
// HELPERS
// ============================================================
function getWeekEnding(dateStr) {
  // Given a date, return the next Saturday (week ending)
  const d = new Date(dateStr + "T12:00:00");
  const day = d.getDay();
  const diff = (6 - day + 7) % 7;
  d.setDate(d.getDate() + diff);
  return d;
}

function formatDate(d) {
  const date = new Date(d);
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const yyyy = date.getFullYear();
  return `${mm}/${dd}/${yyyy}`;
}

function formatNumber(n) {
  return n != null ? n.toLocaleString() : "0";
}

function getISODate(d) {
  const date = new Date(d);
  return date.toISOString().split("T")[0];
}

// ============================================================
// MAIN APP
// ============================================================
function CoffeeTracker() {
  const [activeTab, setActiveTab] = useState("history");
  const [entries, setEntries] = useState([]);
  const [clients, setClients] = useState([]);
  const [loaded, setLoaded] = useState(false);

  // New Entry form state
  const [formClient, setFormClient] = useState("");
  const [formDate, setFormDate] = useState(() => new Date().toISOString().split("T")[0]);
  const [formVolume, setFormVolume] = useState("");

  // Service History filter
  const [filterClient, setFilterClient] = useState("");

  // Clients tab
  const [newClientName, setNewClientName] = useState("");

  // Load
  useEffect(() => {
    setEntries(loadData(STORAGE_KEYS.entries, []));
    setClients(loadData(STORAGE_KEYS.clients, []));
    setLoaded(true);
  }, []);

  // Auto-save
  useEffect(() => { if (loaded) saveData(STORAGE_KEYS.entries, entries); }, [entries, loaded]);
  useEffect(() => { if (loaded) saveData(STORAGE_KEYS.clients, clients); }, [clients, loaded]);

  // ---- New Entry ----
  const handleAddEntry = () => {
    if (!formClient || !formDate || !formVolume) return;
    const vol = parseInt(formVolume, 10);
    if (isNaN(vol) || vol < 0) return;

    const weekEnd = getWeekEnding(formDate);
    const entry = {
      id: Date.now().toString(),
      client: formClient,
      weekEnding: weekEnd.toISOString(),
      volume: vol,
      createdAt: new Date().toISOString(),
    };
    setEntries(prev => [entry, ...prev]);
    setFormVolume("");
  };

  // ---- Delete Entry ----
  const handleDeleteEntry = (id) => {
    setEntries(prev => prev.filter(e => e.id !== id));
  };

  // ---- Clients ----
  const handleAddClient = () => {
    const name = newClientName.trim();
    if (!name || clients.includes(name)) return;
    setClients(prev => [...prev, name].sort());
    setNewClientName("");
  };

  const handleDeleteClient = (name) => {
    setClients(prev => prev.filter(c => c !== name));
  };

  // ---- Computed: Service History with VOL TW / VOL LW ----
  const historyRows = useMemo(() => {
    // Group entries by client, sorted by weekEnding desc
    const sorted = [...entries].sort((a, b) => new Date(b.weekEnding) - new Date(a.weekEnding));

    // For each entry, VOL TW is this entry's volume
    // VOL LW is the previous entry's volume for the same client (the next one chronologically)
    const clientEntries = {};
    for (const e of [...entries].sort((a, b) => new Date(a.weekEnding) - new Date(b.weekEnding))) {
      if (!clientEntries[e.client]) clientEntries[e.client] = [];
      clientEntries[e.client].push(e);
    }

    const rows = sorted.map(entry => {
      const ce = clientEntries[entry.client] || [];
      const idx = ce.findIndex(e => e.id === entry.id);
      const volLW = idx > 0 ? ce[idx - 1].volume : 0;
      return {
        ...entry,
        volTW: entry.volume,
        volLW,
      };
    });

    if (filterClient) {
      return rows.filter(r => r.client === filterClient);
    }
    return rows;
  }, [entries, filterClient]);

  // ---- Dashboard Stats ----
  const dashboardStats = useMemo(() => {
    const clientVolumes = {};
    const clientEntries = {};
    for (const e of entries) {
      if (!clientVolumes[e.client]) {
        clientVolumes[e.client] = 0;
        clientEntries[e.client] = [];
      }
      clientEntries[e.client].push(e);
    }

    // Latest volume per client
    for (const client of Object.keys(clientEntries)) {
      const sorted = clientEntries[client].sort((a, b) => new Date(b.weekEnding) - new Date(a.weekEnding));
      clientVolumes[client] = sorted[0]?.volume || 0;
    }

    const totalClients = clients.length;
    const totalEntries = entries.length;
    const latestVolumes = Object.entries(clientVolumes).sort((a, b) => b[1] - a[1]);

    return { totalClients, totalEntries, latestVolumes };
  }, [entries, clients]);

  // ---- Backup / Restore ----
  const handleBackup = () => {
    const data = {
      entries,
      clients,
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `coffee-tracker-backup-${new Date().toISOString().split("T")[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const fileInputRef = useRef(null);
  const handleRestore = () => {
    fileInputRef.current?.click();
  };

  const handleFileRestore = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.entries) setEntries(data.entries);
        if (data.clients) setClients(data.clients);
      } catch (err) {
        alert("Invalid backup file");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // ---- Tab definitions ----
  const tabs = [
    { id: "newentry", label: "New Entry" },
    { id: "history", label: "Service History" },
    { id: "clients", label: "Clients" },
    { id: "dashboard", label: "Dashboard" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, color: COLORS.text }}>
      {/* Top bar with Backup/Restore */}
      <div style={{
        background: "linear-gradient(135deg, #5C4033, #8B6F5E)",
        padding: "12px 16px",
        display: "flex",
        justifyContent: "flex-start",
        gap: 8,
      }}>
        <button onClick={handleBackup} style={{
          padding: "6px 16px", borderRadius: 20, border: "1px solid rgba(255,255,255,0.3)",
          background: "rgba(255,255,255,0.15)", color: "#fff", fontSize: 13, fontWeight: 600,
          cursor: "pointer",
        }}>Backup</button>
        <button onClick={handleRestore} style={{
          padding: "6px 16px", borderRadius: 20, border: "1px solid rgba(255,255,255,0.3)",
          background: "rgba(255,255,255,0.15)", color: "#fff", fontSize: 13, fontWeight: 600,
          cursor: "pointer",
        }}>Restore</button>
        <input
          ref={fileInputRef}
          type="file"
          accept=".json"
          style={{ display: "none" }}
          onChange={handleFileRestore}
        />
      </div>

      {/* Tab Navigation */}
      <div style={{
        display: "flex",
        borderBottom: `2px solid ${COLORS.cardBorder}`,
        background: COLORS.bg,
        overflowX: "auto",
      }}>
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
            flex: 1,
            padding: "14px 8px",
            border: "none",
            borderBottom: activeTab === tab.id ? `3px solid ${COLORS.tabBorder}` : "3px solid transparent",
            background: "transparent",
            color: activeTab === tab.id ? COLORS.activeTab : COLORS.textMuted,
            fontSize: 14,
            fontWeight: activeTab === tab.id ? 700 : 500,
            cursor: "pointer",
            whiteSpace: "nowrap",
            transition: "all 0.2s",
          }}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ maxWidth: 700, margin: "0 auto", padding: "0 16px" }}>
        {activeTab === "newentry" && (
          <NewEntryTab
            clients={clients}
            formClient={formClient}
            setFormClient={setFormClient}
            formDate={formDate}
            setFormDate={setFormDate}
            formVolume={formVolume}
            setFormVolume={setFormVolume}
            onSubmit={handleAddEntry}
          />
        )}
        {activeTab === "history" && (
          <ServiceHistoryTab
            rows={historyRows}
            clients={clients}
            filterClient={filterClient}
            setFilterClient={setFilterClient}
            onDelete={handleDeleteEntry}
          />
        )}
        {activeTab === "clients" && (
          <ClientsTab
            clients={clients}
            newClientName={newClientName}
            setNewClientName={setNewClientName}
            onAdd={handleAddClient}
            onDelete={handleDeleteClient}
            entries={entries}
          />
        )}
        {activeTab === "dashboard" && (
          <DashboardTab stats={dashboardStats} entries={entries} />
        )}
      </div>
    </div>
  );
}

// ============================================================
// NEW ENTRY TAB
// ============================================================
function NewEntryTab({ clients, formClient, setFormClient, formDate, setFormDate, formVolume, setFormVolume, onSubmit }) {
  return (
    <div style={{ paddingTop: 24 }}>
      <h2 style={{ fontSize: 20, fontWeight: 700, color: COLORS.headerText, marginBottom: 20 }}>
        New Service Entry
      </h2>

      <div style={{
        background: COLORS.card,
        borderRadius: 16,
        padding: 20,
        border: `1px solid ${COLORS.cardBorder}`,
        display: "flex",
        flexDirection: "column",
        gap: 16,
      }}>
        {/* Client Select */}
        <div>
          <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: COLORS.textSecondary, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>
            Client
          </label>
          <select
            value={formClient}
            onChange={e => setFormClient(e.target.value)}
            style={{
              width: "100%",
              padding: "12px 14px",
              borderRadius: 12,
              border: `1px solid ${COLORS.inputBorder}`,
              background: COLORS.inputBg,
              fontSize: 16,
              color: COLORS.text,
              appearance: "auto",
            }}
          >
            <option value="">Select client...</option>
            {clients.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        {/* Date */}
        <div>
          <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: COLORS.textSecondary, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>
            Service Date
          </label>
          <input
            type="date"
            value={formDate}
            onChange={e => setFormDate(e.target.value)}
            style={{
              width: "100%",
              padding: "12px 14px",
              borderRadius: 12,
              border: `1px solid ${COLORS.inputBorder}`,
              background: COLORS.inputBg,
              fontSize: 16,
              color: COLORS.text,
            }}
          />
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>
            Week ending: {formDate ? formatDate(getWeekEnding(formDate)) : "—"}
          </div>
        </div>

        {/* Volume */}
        <div>
          <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: COLORS.textSecondary, marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>
            Volume (cups)
          </label>
          <input
            type="number"
            value={formVolume}
            onChange={e => setFormVolume(e.target.value)}
            placeholder="Enter volume..."
            min="0"
            style={{
              width: "100%",
              padding: "12px 14px",
              borderRadius: 12,
              border: `1px solid ${COLORS.inputBorder}`,
              background: COLORS.inputBg,
              fontSize: 16,
              color: COLORS.text,
            }}
          />
        </div>

        {/* Submit */}
        <button
          onClick={onSubmit}
          disabled={!formClient || !formDate || !formVolume}
          style={{
            width: "100%",
            padding: "14px",
            borderRadius: 12,
            border: "none",
            background: formClient && formDate && formVolume
              ? "linear-gradient(135deg, #5C4033, #8B6F5E)"
              : COLORS.accentLighter,
            color: "#fff",
            fontSize: 16,
            fontWeight: 700,
            cursor: formClient && formDate && formVolume ? "pointer" : "not-allowed",
            transition: "all 0.2s",
          }}
        >
          Add Entry
        </button>
      </div>
    </div>
  );
}

// ============================================================
// SERVICE HISTORY TAB
// ============================================================
function ServiceHistoryTab({ rows, clients, filterClient, setFilterClient, onDelete }) {
  const [confirmDelete, setConfirmDelete] = useState(null);

  return (
    <div style={{ paddingTop: 20 }}>
      {/* Filter Row */}
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 8, flexWrap: "wrap" }}>
        <select
          value={filterClient}
          onChange={e => setFilterClient(e.target.value)}
          style={{
            flex: 1,
            minWidth: 160,
            padding: "12px 14px",
            borderRadius: 12,
            border: `1px solid ${COLORS.inputBorder}`,
            background: COLORS.inputBg,
            fontSize: 15,
            color: COLORS.text,
            appearance: "auto",
          }}
        >
          <option value="">All Clients</option>
          {clients.map(c => <option key={c} value={c}>{c}</option>)}
        </select>

        <button
          onClick={() => setFilterClient("")}
          style={{
            padding: "12px 24px",
            borderRadius: 12,
            border: `1px solid ${COLORS.inputBorder}`,
            background: COLORS.inputBg,
            color: COLORS.textSecondary,
            fontSize: 15,
            fontWeight: 600,
            cursor: "pointer",
          }}
        >
          Clear
        </button>
      </div>

      {/* Entry Count */}
      <div style={{ textAlign: "right", fontSize: 14, color: COLORS.accentLight, fontWeight: 600, marginBottom: 12 }}>
        {rows.length} {rows.length === 1 ? "entry" : "entries"}
      </div>

      {/* Table */}
      <div style={{
        background: COLORS.card,
        borderRadius: 16,
        border: `1px solid ${COLORS.cardBorder}`,
        overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{
          display: "grid",
          gridTemplateColumns: "1fr 1fr 1fr 1fr",
          padding: "14px 16px",
          borderBottom: `2px solid ${COLORS.tableDivider}`,
        }}>
          {["WEEK ENDING", "CLIENT", "VOL TW", "VOL LW"].map(h => (
            <div key={h} style={{
              fontSize: 11,
              fontWeight: 700,
              color: COLORS.headerText,
              letterSpacing: 1.5,
              textTransform: "uppercase",
            }}>{h}</div>
          ))}
        </div>

        {/* Rows */}
        {rows.length === 0 ? (
          <div style={{ padding: 32, textAlign: "center", color: COLORS.textMuted, fontSize: 14 }}>
            No entries yet. Add one from the New Entry tab.
          </div>
        ) : (
          rows.map((row, i) => (
            <div
              key={row.id}
              onClick={() => setConfirmDelete(confirmDelete === row.id ? null : row.id)}
              style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr 1fr 1fr",
                padding: "16px",
                borderBottom: i < rows.length - 1 ? `1px solid ${COLORS.tableDivider}` : "none",
                alignItems: "center",
                cursor: "pointer",
                background: confirmDelete === row.id ? "#FFF5F5" : "transparent",
                transition: "background 0.2s",
              }}
            >
              <div style={{ fontSize: 14, color: COLORS.text, fontWeight: 500 }}>
                {formatDate(row.weekEnding)}
              </div>
              <div style={{ fontSize: 14, color: COLORS.text, fontWeight: 500 }}>
                {row.client}
              </div>
              <div style={{ fontSize: 14, color: COLORS.text, fontWeight: 600 }}>
                {formatNumber(row.volTW)}
              </div>
              <div style={{ fontSize: 14, color: COLORS.textSecondary }}>
                {formatNumber(row.volLW)}
              </div>
              {confirmDelete === row.id && (
                <div style={{
                  gridColumn: "1 / -1",
                  marginTop: 8,
                  display: "flex",
                  gap: 8,
                  justifyContent: "flex-end",
                }}>
                  <button
                    onClick={(e) => { e.stopPropagation(); setConfirmDelete(null); }}
                    style={{
                      padding: "6px 16px", borderRadius: 8, border: `1px solid ${COLORS.inputBorder}`,
                      background: COLORS.inputBg, color: COLORS.textSecondary, fontSize: 13,
                      fontWeight: 600, cursor: "pointer",
                    }}
                  >Cancel</button>
                  <button
                    onClick={(e) => { e.stopPropagation(); onDelete(row.id); setConfirmDelete(null); }}
                    style={{
                      padding: "6px 16px", borderRadius: 8, border: "none",
                      background: COLORS.danger, color: "#fff", fontSize: 13,
                      fontWeight: 600, cursor: "pointer",
                    }}
                  >Delete</button>
                </div>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ============================================================
// CLIENTS TAB
// ============================================================
function ClientsTab({ clients, newClientName, setNewClientName, onAdd, onDelete, entries }) {
  const [confirmDelete, setConfirmDelete] = useState(null);

  const clientEntryCounts = useMemo(() => {
    const counts = {};
    for (const e of entries) {
      counts[e.client] = (counts[e.client] || 0) + 1;
    }
    return counts;
  }, [entries]);

  return (
    <div style={{ paddingTop: 24 }}>
      <h2 style={{ fontSize: 20, fontWeight: 700, color: COLORS.headerText, marginBottom: 20 }}>
        Clients
      </h2>

      {/* Add Client */}
      <div style={{
        display: "flex",
        gap: 10,
        marginBottom: 20,
      }}>
        <input
          type="text"
          value={newClientName}
          onChange={e => setNewClientName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && onAdd()}
          placeholder="New client name..."
          style={{
            flex: 1,
            padding: "12px 14px",
            borderRadius: 12,
            border: `1px solid ${COLORS.inputBorder}`,
            background: COLORS.inputBg,
            fontSize: 16,
            color: COLORS.text,
          }}
        />
        <button
          onClick={onAdd}
          disabled={!newClientName.trim()}
          style={{
            padding: "12px 20px",
            borderRadius: 12,
            border: "none",
            background: newClientName.trim() ? "linear-gradient(135deg, #5C4033, #8B6F5E)" : COLORS.accentLighter,
            color: "#fff",
            fontSize: 15,
            fontWeight: 700,
            cursor: newClientName.trim() ? "pointer" : "not-allowed",
          }}
        >
          Add
        </button>
      </div>

      {/* Client List */}
      <div style={{
        background: COLORS.card,
        borderRadius: 16,
        border: `1px solid ${COLORS.cardBorder}`,
        overflow: "hidden",
      }}>
        {clients.length === 0 ? (
          <div style={{ padding: 32, textAlign: "center", color: COLORS.textMuted, fontSize: 14 }}>
            No clients yet. Add one above.
          </div>
        ) : (
          clients.map((client, i) => (
            <div key={client} style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              padding: "16px",
              borderBottom: i < clients.length - 1 ? `1px solid ${COLORS.tableDivider}` : "none",
            }}>
              <div>
                <div style={{ fontSize: 16, fontWeight: 600, color: COLORS.text }}>{client}</div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>
                  {clientEntryCounts[client] || 0} entries
                </div>
              </div>
              {confirmDelete === client ? (
                <div style={{ display: "flex", gap: 8 }}>
                  <button
                    onClick={() => setConfirmDelete(null)}
                    style={{
                      padding: "6px 12px", borderRadius: 8, border: `1px solid ${COLORS.inputBorder}`,
                      background: COLORS.inputBg, color: COLORS.textSecondary, fontSize: 12,
                      fontWeight: 600, cursor: "pointer",
                    }}
                  >Cancel</button>
                  <button
                    onClick={() => { onDelete(client); setConfirmDelete(null); }}
                    style={{
                      padding: "6px 12px", borderRadius: 8, border: "none",
                      background: COLORS.danger, color: "#fff", fontSize: 12,
                      fontWeight: 600, cursor: "pointer",
                    }}
                  >Delete</button>
                </div>
              ) : (
                <button
                  onClick={() => setConfirmDelete(client)}
                  style={{
                    padding: "6px 14px", borderRadius: 8,
                    border: `1px solid ${COLORS.inputBorder}`,
                    background: "transparent",
                    color: COLORS.textMuted, fontSize: 13, cursor: "pointer",
                  }}
                >Remove</button>
              )}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD TAB
// ============================================================
function DashboardTab({ stats, entries }) {
  // Weekly trend: group entries by week
  const weeklyTotals = useMemo(() => {
    const weeks = {};
    for (const e of entries) {
      const wk = formatDate(e.weekEnding);
      weeks[wk] = (weeks[wk] || 0) + e.volume;
    }
    return Object.entries(weeks)
      .sort((a, b) => new Date(b[0]) - new Date(a[0]))
      .slice(0, 10);
  }, [entries]);

  return (
    <div style={{ paddingTop: 24, paddingBottom: 40 }}>
      <h2 style={{ fontSize: 20, fontWeight: 700, color: COLORS.headerText, marginBottom: 20 }}>
        Dashboard
      </h2>

      {/* Stats Cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
        <div style={{
          background: COLORS.card,
          borderRadius: 16,
          padding: 20,
          border: `1px solid ${COLORS.cardBorder}`,
          textAlign: "center",
        }}>
          <div style={{ fontSize: 32, fontWeight: 800, color: COLORS.accent }}>{stats.totalClients}</div>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginTop: 4 }}>Clients</div>
        </div>
        <div style={{
          background: COLORS.card,
          borderRadius: 16,
          padding: 20,
          border: `1px solid ${COLORS.cardBorder}`,
          textAlign: "center",
        }}>
          <div style={{ fontSize: 32, fontWeight: 800, color: COLORS.accent }}>{stats.totalEntries}</div>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginTop: 4 }}>Total Entries</div>
        </div>
      </div>

      {/* Latest Volume by Client */}
      <div style={{
        background: COLORS.card,
        borderRadius: 16,
        border: `1px solid ${COLORS.cardBorder}`,
        overflow: "hidden",
        marginBottom: 20,
      }}>
        <div style={{
          padding: "14px 16px",
          borderBottom: `2px solid ${COLORS.tableDivider}`,
          fontSize: 13,
          fontWeight: 700,
          color: COLORS.headerText,
          textTransform: "uppercase",
          letterSpacing: 1,
        }}>
          Latest Volume by Client
        </div>
        {stats.latestVolumes.length === 0 ? (
          <div style={{ padding: 24, textAlign: "center", color: COLORS.textMuted, fontSize: 14 }}>
            No data yet
          </div>
        ) : (
          stats.latestVolumes.map(([client, vol], i) => (
            <div key={client} style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              padding: "14px 16px",
              borderBottom: i < stats.latestVolumes.length - 1 ? `1px solid ${COLORS.tableDivider}` : "none",
            }}>
              <span style={{ fontSize: 15, fontWeight: 500, color: COLORS.text }}>{client}</span>
              <span style={{ fontSize: 15, fontWeight: 700, color: COLORS.accent }}>{formatNumber(vol)}</span>
            </div>
          ))
        )}
      </div>

      {/* Recent Weekly Totals */}
      <div style={{
        background: COLORS.card,
        borderRadius: 16,
        border: `1px solid ${COLORS.cardBorder}`,
        overflow: "hidden",
      }}>
        <div style={{
          padding: "14px 16px",
          borderBottom: `2px solid ${COLORS.tableDivider}`,
          fontSize: 13,
          fontWeight: 700,
          color: COLORS.headerText,
          textTransform: "uppercase",
          letterSpacing: 1,
        }}>
          Recent Weeks (All Clients)
        </div>
        {weeklyTotals.length === 0 ? (
          <div style={{ padding: 24, textAlign: "center", color: COLORS.textMuted, fontSize: 14 }}>
            No data yet
          </div>
        ) : (
          weeklyTotals.map(([week, total], i) => (
            <div key={week} style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              padding: "14px 16px",
              borderBottom: i < weeklyTotals.length - 1 ? `1px solid ${COLORS.tableDivider}` : "none",
            }}>
              <span style={{ fontSize: 14, color: COLORS.text }}>{week}</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.accent }}>{formatNumber(total)}</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(CoffeeTracker));
  </script>
</body>
