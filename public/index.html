function loadData(key, fallback) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : fallback;
  } catch {
    return fallback;
  }
}

function saveData(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify(data));
  } catch (e) {
    console.error("Storage error:", e);
  }
}

const PlayerRow = ({ player, type }) => {
  const [expanded, setExpanded] = useState(false);
  const [starts, setStarts] = useState(player.weekStarts || 0);
  const [status, setStatus] = useState(player.weekStatus || "start");
  return (
    <div style={{
      background: status === "sit" ? "#0a0f1488" : "linear-gradient(135deg, #0d1520, #111b28)",
      border: `1px solid ${status === "sit" ? "#1a1a2a" : player.isKeeper ? (player.keeperType === "major" ? "#00b4ff33" : "#00ff8833") : "#1a2a3a"}`,
      borderLeft: player.isKeeper ? `3px solid ${player.keeperType === "major" ? "#00b4ff" : "#00ff88"}` : status === "sit" ? "3px solid #ff4a4a44" : "3px solid #1a2a3a",
      borderRadius: 8, padding: "10px 14px", marginBottom: 4,
      opacity: status === "sit" ? 0.5 : 1, transition: "all 0.2s",
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: "#00b4ff", fontSize: 10, fontWeight: 700, background: "#00b4ff11", padding: "1px 6px", borderRadius: 4, minWidth: 24, textAlign: "center" }}>{player.pos}</span>
            <span style={{ color: "#e0e6ed", fontWeight: 600, fontSize: 13 }}>{player.name}</span>
            <span style={{ color: "#556677", fontSize: 10 }}>{player.team}</span>
            {player.isKeeper && (
              <span style={{
                background: player.keeperType === "major" ? "#00b4ff22" : "#00ff8822",
                color: player.keeperType === "major" ? "#00b4ff" : "#00ff88",
                fontSize: 8, fontWeight: 700, padding: "1px 5px", borderRadius: 8,
              }}>K{player.keeperYear}/{player.keeperMaxYears}</span>
            )}
            {type === "pitcher" && player.pos === "SP" && (
              <select value={starts} onChange={e => setStarts(parseInt(e.target.value))} style={{
                background: starts === 2 ? "#00ff8822" : "#0d1520", border: `1px solid ${starts === 2 ? "#00ff8844" : "#1a2a3a"}`,
                borderRadius: 4, color: starts === 2 ? "#00ff88" : "#8899aa", padding: "1px 4px", fontSize: 10, outline: "none"
              }}>
                <option value={0}>0 GS</option>
                <option value={1}>1 GS</option>
                <option value={2}>2 GS ★</option>
              </select>
            )}
          </div>
          <div style={{ display: "flex", gap: 10, fontSize: 11, color: "#556677", marginTop: 2, marginLeft: 36 }}>
            <span>PROJ: <span style={{ color: "#00b4ff" }}>{player.proj}</span></span>
            {player.ecr && <span>ECR: {player.ecr}</span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={() => setStatus(status === "start" ? "sit" : "start")} style={{
            background: status === "start" ? "#00ff8815" : "#ff4a4a15",
            border: `1px solid ${status === "start" ? "#00ff8844" : "#ff4a4a44"}`,
            borderRadius: 5, color: status === "start" ? "#00ff88" : "#ff4a4a",
            padding: "3px 8px", cursor: "pointer", fontSize: 10, fontWeight: 700,
          }}>
            {status === "start" ? "START" : "SIT"}
          </button>
        </div>
      </div>
    </div>
  );
};

function MyTeamTab() {
  const ctx = useContext(AppCtx);
  const { keepers, setKeepers, keeperWatchlist, setKeeperWatchlist, roster, setRoster, draftPool, setDraftPool, draftPick, setDraftPick, draftLog, setDraftLog, watchlist, setWatchlist, notes, setNotes, news, setNews, searchTerm, setSearchTerm, tradeMyPlayers, setTradeMyPlayers, tradeTheirPlayers, setTradeTheirPlayers } = ctx;

  const [weekNotes, setWeekNotes] = useState("");

  const allPlayers = useMemo(() => {
    const keeperPlayers = keepers.map(k => ({
      ...k, isKeeper: true, keeperType: k.type, keeperYear: k.year, keeperMaxYears: k.maxYears,
    }));
    const nonKeeperRoster = roster.filter(r => !keepers.some(k => k.name === r.name));
    return [...keeperPlayers, ...nonKeeperRoster];
  }, [roster, keepers]);

  const batters = allPlayers.filter(p => !["SP", "RP"].includes(p.pos));
  const pitchers = allPlayers.filter(p => ["SP", "RP"].includes(p.pos));

  const posOrder = ["C", "1B", "2B", "3B", "SS", "OF", "DH"];
  const sortedBatters = [...batters].sort((a, b) => {
    const ai = posOrder.indexOf(a.pos); const bi = posOrder.indexOf(b.pos);
    if (ai !== bi) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    return (b.proj || 0) - (a.proj || 0);
  });
  const sortedPitchers = [...pitchers].sort((a, b) => {
    if (a.pos !== b.pos) return a.pos === "SP" ? -1 : 1;
    return (b.proj || 0) - (a.proj || 0);
  });


  return (
    <div>
      {/* Week Header */}
      <div style={{
        background: "linear-gradient(135deg, #001a2a, #0d1520)",
        border: "1px solid #00b4ff33", borderRadius: 12, padding: 16, marginBottom: 20,
        textAlign: "center"
      }}>
        <div style={{ color: "#00b4ff", fontSize: 11, fontWeight: 700, letterSpacing: 2, marginBottom: 4 }}>WEEKLY LINEUP</div>
        <div style={{ color: "#e0e6ed", fontSize: 18, fontWeight: 700 }}>Set Your Starters</div>
        <div style={{ color: "#556677", fontSize: 12, marginTop: 4 }}>
          Mark 2-start SPs for extra value • Toggle START/SIT for each player
        </div>
      </div>

      {/* Batters */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <h3 style={{ color: "#e0e6ed", margin: 0, fontSize: 14, fontWeight: 700, letterSpacing: 1 }}>BATTERS</h3>
          <span style={{ color: "#556677", fontSize: 11 }}>{batters.length} players</span>
        </div>
        {sortedBatters.length === 0 ? (
          <div style={{ color: "#556677", fontSize: 13, padding: 20, textAlign: "center", background: "#0a111a", borderRadius: 10, border: "1px solid #1a2a3a" }}>
            Add players via Roster tab or Draft HQ to see your lineup here
          </div>
        ) : sortedBatters.map((p, i) => <PlayerRow key={`b-${i}`} player={p} type="batter" />)}
      </div>

      {/* Pitchers */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <h3 style={{ color: "#e0e6ed", margin: 0, fontSize: 14, fontWeight: 700, letterSpacing: 1 }}>PITCHERS</h3>
          <span style={{ color: "#556677", fontSize: 11 }}>{pitchers.length} players</span>
          <span style={{ color: "#00ff88", fontSize: 10, marginLeft: "auto" }}>★ = 2-start week</span>
        </div>
        {sortedPitchers.length === 0 ? (
          <div style={{ color: "#556677", fontSize: 13, padding: 20, textAlign: "center", background: "#0a111a", borderRadius: 10, border: "1px solid #1a2a3a" }}>
            Add pitchers via Roster tab or Draft HQ
          </div>
        ) : sortedPitchers.map((p, i) => <PlayerRow key={`p-${i}`} player={p} type="pitcher" />)}
      </div>

      {/* Analyst Recommendations */}
      <div style={{
        background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 12, padding: 16, marginBottom: 20,
      }}>
        <div style={{ color: "#ffaa00", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 12 }}>📡 ANALYSTS TO FOLLOW</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {[
            { name: "Pitcher List", handle: "@PitcherList", note: "Best SP analysis. Nick Pollack's daily pod is essential.", type: "Pitching" },
            { name: "Tristan Cockcroft", handle: "@ESPN", note: "Points league guru. Best for your format.", type: "Overall" },
            { name: "Eric Karabell", handle: "@ESPN", note: "H2H & roto expert. Injury tracker.", type: "Overall" },
            { name: "Eric Samulski", handle: "@Rotoworld/NBC", note: "Deep position breakdowns. Prospect pipeline.", type: "Prospects" },
            { name: "Jeff Erickson", handle: "@RotoWire", note: "FAAB strategy king. Two-start SP rankings.", type: "In-Season" },
            { name: "Scott Pianowski", handle: "@Yahoo", note: "Position tier rankings. Contrarian takes.", type: "Draft" },
            { name: "FantraxHQ", handle: "@FantraxHQ", note: "Dynasty/prospect rankings. Deep leagues.", type: "Dynasty" },
            { name: "Baseball America", handle: "@BA_Fantasy", note: "Prospect scouting. RoboScout tool in-season.", type: "Prospects" },
          ].map((a, i) => (
            <div key={i} style={{
              background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 8, padding: "8px 10px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                <span style={{ color: "#e0e6ed", fontSize: 12, fontWeight: 600 }}>{a.name}</span>
                <span style={{ color: "#00b4ff", fontSize: 9, background: "#00b4ff15", padding: "1px 5px", borderRadius: 4 }}>{a.type}</span>
              </div>
              <div style={{ color: "#667788", fontSize: 10 }}>{a.handle}</div>
              <div style={{ color: "#556677", fontSize: 10, marginTop: 2, fontStyle: "italic" }}>{a.note}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Quick Scoring Cheat Sheet */}
      <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 12, padding: 14 }}>
        <div style={{ color: "#667788", fontSize: 11, fontWeight: 600, letterSpacing: 1, marginBottom: 8 }}>⚡ HIGH-VALUE SCORING PLAYS</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[
            { label: "W", val: "+10", color: "#00ff88" },
            { label: "S", val: "+7", color: "#00ff88" },
            { label: "CG", val: "+5", color: "#00ff88" },
            { label: "SO", val: "+5", color: "#00ff88" },
            { label: "QS", val: "+4", color: "#00ff88" },
            { label: "HR", val: "+4", color: "#00ff88" },
            { label: "SB", val: "+1.75", color: "#88dd44" },
            { label: "L", val: "-5", color: "#ff4a4a" },
            { label: "KO", val: "-1", color: "#ff4a4a" },
            { label: "ER", val: "-1", color: "#ff4a4a" },
          ].map((s, i) => (
            <div key={i} style={{
              background: `${s.color}11`, border: `1px solid ${s.color}33`, borderRadius: 6,
              padding: "3px 8px", fontSize: 10, color: s.color, fontWeight: 600,
            }}>{s.label} {s.val}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

              <div style={{ display: "flex", alignItems: "center", gap: 12, fontSize: 12, color: "#667788" }}>
                <span>{k.pos} • {k.team}</span>

            </div>
            <button onClick={() => {
              if (confirm(`Remove ${k.name} from keepers?`)) {

            }} style={{
              background: "transparent", border: "1px solid #ff4a4a33", borderRadius: 6,

            }}>
              <Icons.Trash />
            </button>
          </div>

      {/* Keeper Watchlist */}
      <div style={{ marginBottom: 28 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
          <Icons.Star />
          <h3 style={{ color: "#e0e6ed", margin: 0, fontSize: 15, fontWeight: 700, letterSpacing: 1 }}>KEEPER WATCHLIST</h3>
          <span style={{ color: "#556677", fontSize: 11 }}>Decision pending</span>
        </div>

          <div key={i} style={{
            background: "linear-gradient(135deg, #1a1200, #18150a)",
            border: "1px solid #ffaa0033",
            borderRadius: 10, padding: "14px 16px", marginBottom: 8,
            display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ color: "#e0e6ed", fontWeight: 700, fontSize: 15 }}>{k.name}</span>
                <span style={{ background: "#ffaa0022", color: "#ffaa00", fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 10 }}>
                  WATCHING
                </span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, fontSize: 12, color: "#667788" }}>
                <span>{k.pos} • {k.team}</span>
                {k.age && <span>Age: <span style={{ color: "#b8c5d4" }}>{k.age}</span></span>}
                <span>PROJ: <span style={{ color: "#ffaa00", fontWeight: 600 }}>{k.proj}</span></span>
                <span>ECR: <span style={{ color: "#b8c5d4" }}>{k.ecr}</span></span>
              </div>
              {k.notes && <div style={{ fontSize: 11, color: "#887744", marginTop: 4, fontStyle: "italic" }}>{k.notes}</div>}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => {
                if (keepers.length < 5) {
                  setKeepers(prev => [...prev, { ...k, year: 1, maxYears: k.type === "major" ? 2 : 3 }]);
                  setKeeperWatchlist(prev => prev.filter((_, j) => j !== i));
                } else {
                  alert("Already at 5 keepers. Remove one first.");
                }
              }} style={{
                background: "#00ff8822", border: "1px solid #00ff8844", borderRadius: 6,
                color: "#00ff88", padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600
              }}>
                LOCK IN
              </button>
              <button onClick={() => setKeeperWatchlist(prev => prev.filter((_, j) => j !== i))} style={{
                background: "transparent", border: "1px solid #ff4a4a33", borderRadius: 6,
                color: "#ff4a4a", padding: "4px 8px", cursor: "pointer", fontSize: 11
              }}>
                <Icons.Trash />
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* Add Keeper */}
      <button onClick={() => setShowAdd(!showAdd)} style={{
        background: "#00b4ff15", border: "1px dashed #00b4ff44", borderRadius: 10,
        color: "#00b4ff", padding: "12px 18px", cursor: "pointer", fontSize: 13,
        fontWeight: 600, width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8
      }}>
        <Icons.Plus /> Add to Watchlist / Keepers
      </button>
      {showAdd && (
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16, marginTop: 10 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {["name", "pos", "team", "ecr"].map(field => (
              <input key={field} placeholder={field.toUpperCase()} value={addForm[field]}
                onChange={e => setAddForm(prev => ({ ...prev, [field]: e.target.value }))}
                style={{
                  background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6,
                  color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none"
                }} />
            ))}
            <input type="number" placeholder="PROJ" value={addForm.proj || ""}
              onChange={e => setAddForm(prev => ({ ...prev, proj: parseFloat(e.target.value) || 0 }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <select value={addForm.type} onChange={e => setAddForm(prev => ({ ...prev, type: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }}>
              <option value="major">Major League</option>
              <option value="minor">Minor League</option>
            </select>
          </div>
          <input placeholder="Notes" value={addForm.notes}
            onChange={e => setAddForm(prev => ({ ...prev, notes: e.target.value }))}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, width: "100%", marginTop: 8, outline: "none", boxSizing: "border-box" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <button onClick={() => {
              if (addForm.name) {
                setKeeperWatchlist(prev => [...prev, { ...addForm }]);
                setAddForm({ name: "", pos: "", team: "", type: "minor", year: 1, maxYears: 3, proj: 0, ecr: "", notes: "" });
                setShowAdd(false);
              }
            }} style={{
              background: "#ffaa0022", border: "1px solid #ffaa0044", borderRadius: 6,
              color: "#ffaa00", padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600
            }}>Add to Watchlist</button>
            <button onClick={() => setShowAdd(false)} style={{
              background: "transparent", border: "1px solid #334455", borderRadius: 6,
              color: "#667788", padding: "8px 16px", cursor: "pointer", fontSize: 12
            }}>Cancel</button>
          </div>
        </div>
      )}

      {/* Scoring Reference */}
      <div style={{ marginTop: 28 }}>
        <h3 style={{ color: "#667788", fontSize: 13, fontWeight: 600, letterSpacing: 1, marginBottom: 10 }}>SCORING REFERENCE</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 14 }}>
            <div style={{ color: "#00b4ff", fontSize: 11, fontWeight: 700, marginBottom: 8, letterSpacing: 1 }}>BATTING</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 12px" }}>
              {Object.entries(BATTING_SCORING).map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#8899aa", padding: "2px 0" }}>
                  <span>{k}</span>
                  <span style={{ color: v > 0 ? "#00ff88" : v < 0 ? "#ff4a4a" : "#8899aa", fontWeight: 600 }}>{v > 0 ? "+" : ""}{v}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 14 }}>
            <div style={{ color: "#00b4ff", fontSize: 11, fontWeight: 700, marginBottom: 8, letterSpacing: 1 }}>PITCHING</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "2px 12px" }}>
              {Object.entries(PITCHING_SCORING).map(([k, v]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#8899aa", padding: "2px 0" }}>
                  <span>{k}</span>
                  <span style={{ color: v > 0 ? "#00ff88" : v < 0 ? "#ff4a4a" : "#8899aa", fontWeight: 600 }}>{v > 0 ? "+" : ""}{v}</span>
