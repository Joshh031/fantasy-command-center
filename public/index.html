              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// DRAFT HQ TAB
// ============================================================
function DraftTab() {
  const ctx = useContext(AppCtx);
  const { keepers, setKeepers, keeperWatchlist, setKeeperWatchlist, roster, setRoster, draftPool, setDraftPool, draftPick, setDraftPick, draftLog, setDraftLog, watchlist, setWatchlist, notes, setNotes, news, setNews, searchTerm, setSearchTerm, tradeMyPlayers, setTradeMyPlayers, tradeTheirPlayers, setTradeTheirPlayers } = ctx;

  const [sortBy, setSortBy] = useState("proj");
  const [posFilter, setPosFilter] = useState("ALL");
  const [hideDrafted, setHideDrafted] = useState(false);
  const [bulkInput, setBulkInput] = useState("");
  const [showBulk, setShowBulk] = useState(false);
  const [addPlayerForm, setAddPlayerForm] = useState({ name: "", pos: "", team: "", proj: 0, ecr: "", adp: 0, myRank: 0 });
  const [showAddPlayer, setShowAddPlayer] = useState(false);

  const positions = ["ALL", "C", "1B", "2B", "3B", "SS", "OF", "DH", "SP", "RP"];

  // Positional need targets for a balanced roster
  const posTargets = { C: 1, "1B": 1, "2B": 1, "3B": 1, SS: 1, OF: 4, DH: 1, SP: 5, RP: 3 };

  // Current roster position counts (keepers + drafted)
  const myPosCounts = useMemo(() => {
    const counts = {};
    const allMine = [
      ...keepers.map(k => ({ pos: k.pos })),
      ...roster.filter(r => !keepers.some(k => k.name === r.name)).map(r => ({ pos: r.pos })),
    ];
    allMine.forEach(p => { counts[p.pos] = (counts[p.pos] || 0) + 1; });
    return counts;
  }, [keepers, roster]);

  // Positions still needed
  const posNeeds = useMemo(() => {
    const needs = {};
    Object.entries(posTargets).forEach(([pos, target]) => {
      const have = myPosCounts[pos] || 0;
      const need = Math.max(0, target - have);
      if (need > 0) needs[pos] = need;
    });
    return needs;
  }, [myPosCounts]);

  // Top 3 recommendations per position of need
  const optimizer = useMemo(() => {
    const available = draftPool.filter(p => !p.drafted);
    const recs = {};
    Object.keys(posNeeds).forEach(pos => {
      const matches = available.filter(p => p.pos === pos || (pos === "OF" && p.pos?.includes("OF")));
      matches.sort((a, b) => {
        if ((a.myRank || 999) !== (b.myRank || 999)) return (a.myRank || 999) - (b.myRank || 999);
        return (b.proj || 0) - (a.proj || 0);
      });
      recs[pos] = matches.slice(0, 3);
    });
    return recs;
  }, [draftPool, posNeeds]);

  const filteredPool = useMemo(() => {
    let pool = [...draftPool];
    if (hideDrafted) pool = pool.filter(p => !p.drafted);
    if (posFilter !== "ALL") pool = pool.filter(p => p.pos === posFilter || (posFilter === "OF" && p.pos?.includes("OF")));
    if (searchTerm) pool = pool.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
    pool.sort((a, b) => {
      if (sortBy === "myRank") return (a.myRank || 999) - (b.myRank || 999);
      if (sortBy === "adp") return (a.adp || 999) - (b.adp || 999);
      return (b.proj || 0) - (a.proj || 0);
    });
    return pool;
  }, [draftPool, posFilter, searchTerm, sortBy, hideDrafted]);

  const parseBulkPlayers = (text) => {
    const lines = text.split("\n").filter(l => l.trim());
    const players = lines.map(line => {
      const parts = line.split(/[,\t]+/).map(s => s.trim());
      return {
        name: parts[0] || "",
        pos: parts[1] || "",
        team: parts[2] || "",
        proj: parseFloat(parts[3]) || 0,
        ecr: parts[4] || "",
        adp: parseFloat(parts[5]) || 0,
        myRank: parseFloat(parts[6]) || 0,
        drafted: false,
        draftedBy: "",
      };
    }).filter(p => p.name);
    return players;
  };

  const snakePicks = useMemo(() => {
    if (!draftPick) return [];
    const picks = [];
    const rounds = 25;
    for (let r = 1; r <= rounds; r++) {
      const pick = r % 2 === 1
        ? (r - 1) * LEAGUE_SIZE + draftPick
        : r * LEAGUE_SIZE - draftPick + 1;
      picks.push({ round: r, overall: pick });
    }
    return picks;
  }, [draftPick]);

  return (
    <div>
      {/* Draft Pick Setup */}
      <div style={{
        background: "linear-gradient(135deg, #0d1520, #111b28)",
        border: "1px solid #1a2a3a", borderRadius: 12, padding: 16, marginBottom: 20,
        display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12
      }}>
        <div>
          <div style={{ color: "#667788", fontSize: 11, fontWeight: 600, letterSpacing: 1, marginBottom: 4 }}>YOUR DRAFT POSITION</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {draftPick ? (
              <span style={{ color: "#00b4ff", fontSize: 28, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>
                #{draftPick}
              </span>
            ) : (
              <span style={{ color: "#556677", fontSize: 15 }}>Not set</span>
            )}
            <select value={draftPick || ""} onChange={e => setDraftPick(parseInt(e.target.value) || null)}
              style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "6px 10px", fontSize: 13, outline: "none" }}>
              <option value="">Set pick...</option>
              {Array.from({ length: 10 }, (_, i) => (
                <option key={i + 1} value={i + 1}>Pick #{i + 1}</option>
              ))}
            </select>
          </div>
        </div>
        {draftPick && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {snakePicks.slice(0, 8).map(p => (
              <div key={p.round} style={{
                background: "#00b4ff11", border: "1px solid #00b4ff33", borderRadius: 6,
                padding: "4px 8px", fontSize: 11, color: "#00b4ff",
              }}>
                R{p.round}: #{p.overall}
              </div>
            ))}
            <span style={{ color: "#556677", fontSize: 11, alignSelf: "center" }}>...</span>
          </div>
        )}
      </div>

      {/* DRAFT OPTIMIZER — Top 3 per positional need */}
      {Object.keys(posNeeds).length > 0 && draftPool.length > 0 && (
        <div style={{
          background: "linear-gradient(135deg, #001a2a, #0d1520)",
          border: "1px solid #00b4ff33", borderRadius: 12, padding: 16, marginBottom: 20,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <span style={{ fontSize: 16 }}>⚡</span>
            <h3 style={{ color: "#00b4ff", margin: 0, fontSize: 14, fontWeight: 700, letterSpacing: 1 }}>DRAFT OPTIMIZER</h3>
            <span style={{ color: "#556677", fontSize: 11 }}>Top 3 by positional need × your rank</span>
          </div>
          {/* Positional need badges */}
          <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
            {Object.entries(posNeeds).map(([pos, need]) => (
              <div key={pos} style={{
                background: need >= 2 ? "#ff6b3522" : "#ffaa0015",
                border: `1px solid ${need >= 2 ? "#ff6b3544" : "#ffaa0033"}`,
                borderRadius: 6, padding: "3px 10px", fontSize: 11,
                color: need >= 2 ? "#ff6b35" : "#ffaa00", fontWeight: 600,
              }}>
                {pos} ×{need} needed
              </div>
            ))}
          </div>
          {/* Recommendations grid */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 10 }}>
            {Object.entries(optimizer).filter(([_, players]) => players.length > 0).map(([pos, players]) => (
              <div key={pos} style={{
                background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 12,
              }}>
                <div style={{ color: "#00b4ff", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>
                  TOP {pos}
                </div>
                {players.map((p, j) => (
                  <div key={j} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "6px 0", borderBottom: j < players.length - 1 ? "1px solid #111b28" : "none"
                  }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{
                          color: j === 0 ? "#00ff88" : j === 1 ? "#88dd44" : "#ffaa00",
                          fontSize: 10, fontWeight: 800, minWidth: 16
                        }}>#{j + 1}</span>
                        <span style={{ color: "#e0e6ed", fontSize: 12, fontWeight: 600 }}>{p.name}</span>
                      </div>
                      <div style={{ fontSize: 10, color: "#556677", marginLeft: 22 }}>
                        {p.team} • PROJ: <span style={{ color: "#00b4ff" }}>{p.proj}</span>
                        {p.myRank > 0 && <> • Rank: <span style={{ color: "#ffaa00" }}>#{p.myRank}</span></>}
                      </div>
                    </div>
                    <button onClick={() => {
                      const idx = draftPool.findIndex(pl => pl.name === p.name && !pl.drafted);
                      if (idx >= 0) {
                        setDraftPool(prev => prev.map((pl, k) => k === idx ? { ...pl, drafted: true, draftedBy: "ME" } : pl));
                        setRoster(prev => [...prev, { ...p, isKeeper: false }]);
                        setDraftLog(prev => [...prev, { player: p.name, pos: p.pos, by: "ME", time: new Date().toISOString() }]);
                      }
                    }} style={{
                      background: "#00ff8822", border: "1px solid #00ff8844", borderRadius: 5,
                      color: "#00ff88", padding: "3px 8px", cursor: "pointer", fontSize: 9, fontWeight: 700
                    }}>DRAFT</button>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Pool Management */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <button onClick={() => setShowBulk(!showBulk)} style={{
          background: "#00b4ff15", border: "1px solid #00b4ff44", borderRadius: 8,
          color: "#00b4ff", padding: "8px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600
        }}>
          📋 Bulk Import
        </button>
        <button onClick={() => setShowAddPlayer(!showAddPlayer)} style={{
          background: "#00ff8815", border: "1px solid #00ff8844", borderRadius: 8,
          color: "#00ff88", padding: "8px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600
        }}>
          <Icons.Plus /> Add Player
        </button>
        <button onClick={() => setHideDrafted(!hideDrafted)} style={{
          background: hideDrafted ? "#ff6b3522" : "transparent",
          border: `1px solid ${hideDrafted ? "#ff6b3566" : "#334455"}`,
          borderRadius: 8, color: hideDrafted ? "#ff6b35" : "#667788",
          padding: "8px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600
        }}>
          {hideDrafted ? "✓ Hiding Drafted" : "Hide Drafted"}
        </button>
        <div style={{ color: "#556677", fontSize: 12, marginLeft: "auto" }}>
          {draftPool.length} total • <span style={{ color: "#00ff88" }}>{draftPool.filter(p => !p.drafted).length} avail</span> • <span style={{ color: "#ff4a4a" }}>{draftPool.filter(p => p.drafted).length} gone</span>
        </div>
      </div>

      {showBulk && (
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ color: "#8899aa", fontSize: 11, marginBottom: 8 }}>
            Paste players: <span style={{ color: "#00b4ff" }}>Name, Pos, Team, Proj, ECR, ADP, MyRank</span> (one per line, comma or tab separated)
          </div>
          <textarea value={bulkInput} onChange={e => setBulkInput(e.target.value)}
            placeholder={`Vladimir Guerrero Jr., 1B, TOR, 485.2, 1B1, 8, 5\nYordan Alvarez, OF, HOU, 450.4, DH3, 15, 12\nTrea Turner, SS, PHI, 439.6, SS5, 30, 25`}
            style={{
              background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6,
              color: "#e0e6ed", padding: 12, fontSize: 12, width: "100%", minHeight: 120,
              fontFamily: "'JetBrains Mono', monospace", outline: "none", resize: "vertical", boxSizing: "border-box"
            }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <button onClick={() => {
              const players = parseBulkPlayers(bulkInput);
              if (players.length) {
                setDraftPool(prev => [...prev, ...players]);
                setBulkInput("");
                setShowBulk(false);
              }
            }} style={{
              background: "#00b4ff22", border: "1px solid #00b4ff44", borderRadius: 6,
              color: "#00b4ff", padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600
            }}>Import {parseBulkPlayers(bulkInput).length} Players</button>
            <button onClick={() => {
              if (confirm("Clear entire draft pool?")) setDraftPool([]);
            }} style={{
              background: "#ff4a4a15", border: "1px solid #ff4a4a33", borderRadius: 6,
              color: "#ff4a4a", padding: "8px 16px", cursor: "pointer", fontSize: 12
            }}>Clear Pool</button>
          </div>
        </div>
      )}

      {showAddPlayer && (
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            <input placeholder="Name" value={addPlayerForm.name} onChange={e => setAddPlayerForm(p => ({ ...p, name: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="Pos" value={addPlayerForm.pos} onChange={e => setAddPlayerForm(p => ({ ...p, pos: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="Team" value={addPlayerForm.team} onChange={e => setAddPlayerForm(p => ({ ...p, team: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="Proj" type="number" value={addPlayerForm.proj || ""} onChange={e => setAddPlayerForm(p => ({ ...p, proj: parseFloat(e.target.value) || 0 }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="ECR" value={addPlayerForm.ecr} onChange={e => setAddPlayerForm(p => ({ ...p, ecr: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="ADP" type="number" value={addPlayerForm.adp || ""} onChange={e => setAddPlayerForm(p => ({ ...p, adp: parseFloat(e.target.value) || 0 }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="My Rank" type="number" value={addPlayerForm.myRank || ""} onChange={e => setAddPlayerForm(p => ({ ...p, myRank: parseFloat(e.target.value) || 0 }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
          </div>
          <button onClick={() => {
            if (addPlayerForm.name) {
              setDraftPool(prev => [...prev, { ...addPlayerForm, drafted: false, draftedBy: "" }]);
              setAddPlayerForm({ name: "", pos: "", team: "", proj: 0, ecr: "", adp: 0, myRank: 0 });
              setShowAddPlayer(false);
            }
          }} style={{
            background: "#00ff8822", border: "1px solid #00ff8844", borderRadius: 6,
            color: "#00ff88", padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, marginTop: 10
          }}>Add to Pool</button>
        </div>
      )}

      {/* Filters & Sort */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        {positions.map(pos => (
          <button key={pos} onClick={() => setPosFilter(pos)} style={{
            background: posFilter === pos ? "#00b4ff22" : "transparent",
            border: `1px solid ${posFilter === pos ? "#00b4ff66" : "#1a2a3a"}`,
            borderRadius: 6, color: posFilter === pos ? "#00b4ff" : "#556677",
            padding: "4px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600,
          }}>{pos}</button>
        ))}
        <div style={{ flex: 1 }} />
        <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
          background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6,
          color: "#e0e6ed", padding: "4px 10px", fontSize: 11, outline: "none"
        }}>
          <option value="proj">Sort: Projection</option>
          <option value="adp">Sort: ADP</option>
          <option value="myRank">Sort: My Rank</option>
        </select>
        <input placeholder="Search..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{
          background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6,
          color: "#e0e6ed", padding: "6px 12px", fontSize: 12, outline: "none", width: 140
        }} />
      </div>

      {/* Player Pool List */}
      <div style={{ maxHeight: 500, overflowY: "auto" }}>
        {filteredPool.map((p, i) => {
          const poolIdx = draftPool.findIndex(pl => pl.name === p.name && pl.pos === p.pos && pl.team === p.team);
          return (
          <div key={i} style={{
            background: p.drafted ? "#0a111a55" : "linear-gradient(135deg, #0d1520, #111b28)",
            border: `1px solid ${p.drafted ? "#1a1a2a" : "#1a2a3a"}`,
            borderRadius: 8, padding: "10px 14px", marginBottom: 4,
            display: "flex", alignItems: "center", justifyContent: "space-between",
            opacity: p.drafted ? 0.4 : 1, transition: "all 0.2s"
          }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {p.myRank > 0 && <span style={{ color: "#ffaa00", fontSize: 10, fontWeight: 800, minWidth: 28 }}>#{p.myRank}</span>}
                <span style={{ color: p.drafted ? "#556677" : "#e0e6ed", fontWeight: 600, fontSize: 13, textDecoration: p.drafted ? "line-through" : "none" }}>{p.name}</span>
                <span style={{ color: "#00b4ff", fontSize: 10, fontWeight: 600 }}>{p.pos}</span>
                <span style={{ color: "#556677", fontSize: 10 }}>{p.team}</span>
                {p.drafted && <span style={{ color: "#ff6b35", fontSize: 10, fontWeight: 600 }}>→ {p.draftedBy}</span>}
              </div>
              <div style={{ display: "flex", gap: 12, fontSize: 11, color: "#556677", marginTop: 2, marginLeft: p.myRank > 0 ? 28 : 0 }}>
                <span>PROJ: <span style={{ color: "#00b4ff" }}>{p.proj}</span></span>
                {p.ecr && <span>ECR: {p.ecr}</span>}
                {p.adp > 0 && <span>ADP: {p.adp}</span>}
              </div>
            </div>
            {!p.drafted ? (
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => {
                  setDraftPool(prev => prev.map((pl, j) => j === poolIdx ? { ...pl, drafted: true, draftedBy: "ME" } : pl));
                  setRoster(prev => [...prev, { ...p, isKeeper: false }]);
                  setDraftLog(prev => [...prev, { player: p.name, pos: p.pos, by: "ME", time: new Date().toISOString() }]);
                }} style={{
                  background: "#00ff8822", border: "1px solid #00ff8844", borderRadius: 6,
                  color: "#00ff88", padding: "4px 10px", cursor: "pointer", fontSize: 10, fontWeight: 700
                }}>DRAFT</button>
                <button onClick={() => {
                  const team = prompt("Drafted by which team?");
                  if (team) {
                    setDraftPool(prev => prev.map((pl, j) => j === poolIdx ? { ...pl, drafted: true, draftedBy: team } : pl));
                    setDraftLog(prev => [...prev, { player: p.name, pos: p.pos, by: team, time: new Date().toISOString() }]);
                  }
                }} style={{
                  background: "#ff6b3515", border: "1px solid #ff6b3533", borderRadius: 6,
                  color: "#ff6b35", padding: "4px 8px", cursor: "pointer", fontSize: 10, fontWeight: 600
                }}>OFF</button>
                <button onClick={() => setWatchlist(prev => [...prev, p])} style={{
                  background: "transparent", border: "1px solid #ffaa0033", borderRadius: 6,
                  color: "#ffaa00", padding: "4px 6px", cursor: "pointer", fontSize: 10
                }}>★</button>
              </div>
            ) : (
              <button onClick={() => {
                setDraftPool(prev => prev.map((pl, j) => j === poolIdx ? { ...pl, drafted: false, draftedBy: "" } : pl));
                if (p.draftedBy === "ME") setRoster(prev => prev.filter(r => r.name !== p.name));
                setDraftLog(prev => prev.filter(l => l.player !== p.name));
              }} style={{
                background: "transparent", border: "1px solid #334455", borderRadius: 6,
                color: "#667788", padding: "4px 10px", cursor: "pointer", fontSize: 10
              }}>UNDO</button>
            )}
          </div>
        );})}
        {filteredPool.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "#556677" }}>
            {draftPool.length === 0 ? "Import players to build your draft pool" : "No matching players"}
          </div>
        )}
      </div>

      {/* Draft Log */}
      {draftLog.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <h3 style={{ color: "#667788", fontSize: 13, fontWeight: 600, letterSpacing: 1, marginBottom: 10 }}>DRAFT LOG</h3>
          <div style={{ maxHeight: 200, overflowY: "auto" }}>
            {[...draftLog].reverse().map((l, i) => (
              <div key={i} style={{ fontSize: 11, color: "#8899aa", padding: "4px 0", borderBottom: "1px solid #111b28" }}>
                <span style={{ color: l.by === "ME" ? "#00ff88" : "#ff6b35", fontWeight: 600 }}>{l.by}</span>
                {" → "}
                <span style={{ color: "#e0e6ed" }}>{l.player}</span>
                <span style={{ color: "#556677" }}> ({l.pos})</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// ROSTER TAB
// ============================================================
function RosterTab() {
  const ctx = useContext(AppCtx);
  const { keepers, setKeepers, keeperWatchlist, setKeeperWatchlist, roster, setRoster, draftPool, setDraftPool, draftPick, setDraftPick, draftLog, setDraftLog, watchlist, setWatchlist, notes, setNotes, news, setNews, searchTerm, setSearchTerm, tradeMyPlayers, setTradeMyPlayers, tradeTheirPlayers, setTradeTheirPlayers } = ctx;

  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({ name: "", pos: "", team: "", proj: 0, ecr: "", isKeeper: false, keeperYear: 0, keeperMaxYears: 0 });

  const rosterWithKeepers = useMemo(() => {
    const keeperPlayers = keepers.map(k => ({
      name: k.name, pos: k.pos, team: k.team, proj: k.proj, ecr: k.ecr,
      isKeeper: true, keeperType: k.type, keeperYear: k.year, keeperMaxYears: k.maxYears,
    }));
    const nonKeeperRoster = roster.filter(r => !keepers.some(k => k.name === r.name));
    return [...keeperPlayers, ...nonKeeperRoster];
  }, [roster, keepers]);

  const posCounts = useMemo(() => {
    const counts = {};
    rosterWithKeepers.forEach(p => { counts[p.pos] = (counts[p.pos] || 0) + 1; });
    return counts;
  }, [rosterWithKeepers]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ color: "#667788", fontSize: 12 }}>
          {rosterWithKeepers.length} / {ROSTER_SLOTS.length} roster spots filled
        </div>
        <button onClick={() => setShowAdd(!showAdd)} style={{
          background: "#00b4ff15", border: "1px solid #00b4ff44", borderRadius: 8,
          color: "#00b4ff", padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600
        }}><Icons.Plus /> Add Player</button>
      </div>

      {showAdd && (
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16, marginBottom: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            <input placeholder="Name" value={addForm.name} onChange={e => setAddForm(p => ({ ...p, name: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="Pos" value={addForm.pos} onChange={e => setAddForm(p => ({ ...p, pos: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="Team" value={addForm.team} onChange={e => setAddForm(p => ({ ...p, team: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="Proj" type="number" value={addForm.proj || ""} onChange={e => setAddForm(p => ({ ...p, proj: parseFloat(e.target.value) || 0 }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
            <input placeholder="ECR" value={addForm.ecr} onChange={e => setAddForm(p => ({ ...p, ecr: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
          </div>
          <button onClick={() => {
            if (addForm.name) {
              setRoster(prev => [...prev, { ...addForm }]);
              setAddForm({ name: "", pos: "", team: "", proj: 0, ecr: "", isKeeper: false, keeperYear: 0, keeperMaxYears: 0 });
              setShowAdd(false);
            }
          }} style={{
            background: "#00ff8822", border: "1px solid #00ff8844", borderRadius: 6,
            color: "#00ff88", padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, marginTop: 10
          }}>Add to Roster</button>
        </div>
      )}

      {/* Roster Grid */}
      <div>
        {rosterWithKeepers.sort((a, b) => (b.proj || 0) - (a.proj || 0)).map((p, i) => (
          <div key={i} style={{
            background: p.isKeeper ? "linear-gradient(135deg, #0a1520, #0d1a28)" : "#0d1520",
            border: `1px solid ${p.isKeeper ? (p.keeperType === "major" ? "#00b4ff33" : "#00ff8833") : "#1a2a3a"}`,
            borderLeft: p.isKeeper ? `3px solid ${p.keeperType === "major" ? "#00b4ff" : "#00ff88"}` : "3px solid transparent",
            borderRadius: 8, padding: "10px 14px", marginBottom: 4,
            display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: "#e0e6ed", fontWeight: 600, fontSize: 13 }}>{p.name}</span>
                <span style={{ color: "#00b4ff", fontSize: 10, fontWeight: 600, background: "#00b4ff11", padding: "1px 6px", borderRadius: 4 }}>{p.pos}</span>
                <span style={{ color: "#556677", fontSize: 10 }}>{p.team}</span>
                {p.isKeeper && (
                  <span style={{
                    background: p.keeperType === "major" ? "#00b4ff22" : "#00ff8822",
                    color: p.keeperType === "major" ? "#00b4ff" : "#00ff88",
                    fontSize: 9, fontWeight: 700, padding: "1px 6px", borderRadius: 8, letterSpacing: 0.5,
                  }}>
                    K{p.keeperYear}/{p.keeperMaxYears}
                  </span>
                )}
              </div>
              <div style={{ display: "flex", gap: 12, fontSize: 11, color: "#556677", marginTop: 2 }}>
                <span>PROJ: <span style={{ color: "#00b4ff" }}>{p.proj}</span></span>
                {p.ecr && <span>ECR: {p.ecr}</span>}
              </div>
            </div>
            {!p.isKeeper && (
              <button onClick={() => {
                setRoster(prev => prev.filter((_, j) => {
                  const nonKeeperIdx = roster.findIndex(r => r.name === p.name);
                  return j !== nonKeeperIdx;
                }));
              }} style={{
                background: "transparent", border: "1px solid #ff4a4a33", borderRadius: 6,
                color: "#ff4a4a", padding: "4px 8px", cursor: "pointer", fontSize: 11
              }}><Icons.Trash /></button>
            )}
          </div>
        ))}
      </div>

      {/* Position Summary */}
      <div style={{ marginTop: 20, background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 14 }}>
        <div style={{ color: "#667788", fontSize: 11, fontWeight: 600, letterSpacing: 1, marginBottom: 8 }}>POSITION BREAKDOWN</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {Object.entries(posCounts).sort().map(([pos, count]) => (
            <div key={pos} style={{
              background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6,
              padding: "4px 10px", fontSize: 11
            }}>
              <span style={{ color: "#00b4ff", fontWeight: 600 }}>{pos}</span>
              <span style={{ color: "#8899aa" }}> ×{count}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// FREE AGENT ANALYZER TAB
// ============================================================
function FreeAgentTab() {
  const ctx = useContext(AppCtx);
  const { keepers, setKeepers, keeperWatchlist, setKeeperWatchlist, roster, setRoster, draftPool, setDraftPool, draftPick, setDraftPick, draftLog, setDraftLog, watchlist, setWatchlist, notes, setNotes, news, setNews, searchTerm, setSearchTerm, tradeMyPlayers, setTradeMyPlayers, tradeTheirPlayers, setTradeTheirPlayers } = ctx;

  const [myPlayer, setMyPlayer] = useState("");
  const [faPlayer, setFaPlayer] = useState({ name: "", pos: "", team: "", proj: 0, ecr: "", stats: "" });
  const [analysis, setAnalysis] = useState(null);

  const allRosterPlayers = useMemo(() => {
    const keeperPlayers = keepers.map(k => k.name);
    return [...roster.map(r => r.name), ...keeperPlayers];
  }, [roster, keepers]);

  const selectedPlayer = useMemo(() => {
    if (!myPlayer) return null;
    const fromKeepers = keepers.find(k => k.name === myPlayer);
    if (fromKeepers) return { ...fromKeepers, isKeeper: true };
    return roster.find(r => r.name === myPlayer) || null;
  }, [myPlayer, keepers, roster]);

  const runAnalysis = () => {
    if (!selectedPlayer || !faPlayer.name) return;
    const projDiff = (faPlayer.proj || 0) - (selectedPlayer.proj || 0);
    const analysis = {
      projDiff,
      recommendation: projDiff > 20 ? "STRONG ADD" : projDiff > 0 ? "MARGINAL ADD" : projDiff > -20 ? "MARGINAL HOLD" : "STRONG HOLD",
      color: projDiff > 20 ? "#00ff88" : projDiff > 0 ? "#88dd44" : projDiff > -20 ? "#ffaa00" : "#ff4a4a",
      keeperWarning: selectedPlayer.isKeeper,
    };
    setAnalysis(analysis);
  };

  return (
    <div>
      <div style={{ color: "#8899aa", fontSize: 13, marginBottom: 20 }}>
        Compare a player on your roster against a free agent to evaluate the swap.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        {/* My Player */}
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16 }}>
          <div style={{ color: "#ff6b35", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>DROP CANDIDATE</div>
          <select value={myPlayer} onChange={e => { setMyPlayer(e.target.value); setAnalysis(null); }}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, width: "100%", outline: "none", boxSizing: "border-box" }}>
            <option value="">Select player...</option>
            {allRosterPlayers.map((name, i) => <option key={i} value={name}>{name}</option>)}
          </select>
          {selectedPlayer && (
            <div style={{ marginTop: 12, fontSize: 12, color: "#8899aa" }}>
              <div>{selectedPlayer.pos} • {selectedPlayer.team}</div>
              <div>PROJ: <span style={{ color: "#00b4ff", fontWeight: 600 }}>{selectedPlayer.proj}</span></div>
              {selectedPlayer.ecr && <div>ECR: {selectedPlayer.ecr}</div>}
              {selectedPlayer.isKeeper && (
                <div style={{ color: "#ff6b35", marginTop: 6, display: "flex", alignItems: "center", gap: 4 }}>
                  <Icons.Alert /> KEEPER — dropping loses keeper value
                </div>
              )}
            </div>
          )}
        </div>

        {/* FA Player */}
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16 }}>
          <div style={{ color: "#00ff88", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>ADD CANDIDATE</div>
          <input placeholder="Player name" value={faPlayer.name}
            onChange={e => { setFaPlayer(p => ({ ...p, name: e.target.value })); setAnalysis(null); }}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, width: "100%", outline: "none", marginBottom: 8, boxSizing: "border-box" }} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            <input placeholder="Pos" value={faPlayer.pos} onChange={e => setFaPlayer(p => ({ ...p, pos: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "6px 10px", fontSize: 12, outline: "none" }} />
            <input placeholder="Team" value={faPlayer.team} onChange={e => setFaPlayer(p => ({ ...p, team: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "6px 10px", fontSize: 12, outline: "none" }} />
            <input placeholder="Proj" type="number" value={faPlayer.proj || ""} onChange={e => setFaPlayer(p => ({ ...p, proj: parseFloat(e.target.value) || 0 }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "6px 10px", fontSize: 12, outline: "none" }} />
            <input placeholder="ECR" value={faPlayer.ecr} onChange={e => setFaPlayer(p => ({ ...p, ecr: e.target.value }))}
              style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "6px 10px", fontSize: 12, outline: "none" }} />
          </div>
          <textarea placeholder="Notes / stats / context..." value={faPlayer.stats}
            onChange={e => setFaPlayer(p => ({ ...p, stats: e.target.value }))}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 10px", fontSize: 12, width: "100%", marginTop: 8, outline: "none", minHeight: 60, resize: "vertical", boxSizing: "border-box" }} />
        </div>
      </div>

      <button onClick={runAnalysis} disabled={!selectedPlayer || !faPlayer.name} style={{
        background: selectedPlayer && faPlayer.name ? "#00b4ff22" : "#111b28",
        border: `1px solid ${selectedPlayer && faPlayer.name ? "#00b4ff66" : "#1a2a3a"}`,
        borderRadius: 10, color: selectedPlayer && faPlayer.name ? "#00b4ff" : "#556677",
        padding: "12px 24px", cursor: selectedPlayer && faPlayer.name ? "pointer" : "not-allowed",
        fontSize: 14, fontWeight: 700, width: "100%", letterSpacing: 1
      }}>
        ⚡ ANALYZE SWAP
      </button>

      {analysis && (
        <div style={{
          background: `${analysis.color}08`, border: `1px solid ${analysis.color}44`,
          borderRadius: 12, padding: 20, marginTop: 16, textAlign: "center"
        }}>
          <div style={{ color: analysis.color, fontSize: 24, fontWeight: 800, marginBottom: 8 }}>
            {analysis.recommendation}
          </div>
          <div style={{ color: "#8899aa", fontSize: 13, marginBottom: 12 }}>
            Projection difference: <span style={{ color: analysis.color, fontWeight: 700 }}>
              {analysis.projDiff > 0 ? "+" : ""}{analysis.projDiff.toFixed(1)} pts
            </span>
          </div>
          {analysis.keeperWarning && (
            <div style={{ color: "#ff6b35", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginTop: 8 }}>
              <Icons.Alert /> WARNING: Dropping a keeper — consider long-term implications
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// TRADE ANALYZER TAB
// ============================================================
function TradeTab() {
  const ctx = useContext(AppCtx);
  const { keepers, setKeepers, keeperWatchlist, setKeeperWatchlist, roster, setRoster, draftPool, setDraftPool, draftPick, setDraftPick, draftLog, setDraftLog, watchlist, setWatchlist, notes, setNotes, news, setNews, searchTerm, setSearchTerm, tradeMyPlayers, setTradeMyPlayers, tradeTheirPlayers, setTradeTheirPlayers } = ctx;

  const [theirInput, setTheirInput] = useState({ name: "", pos: "", team: "", proj: 0 });
  const [myInput, setMyInput] = useState("");
  const [result, setResult] = useState(null);

  const allRosterPlayers = useMemo(() => {
    const keeperPlayers = keepers.map(k => ({ ...k, isKeeper: true }));
    return [...keeperPlayers, ...roster.filter(r => !keepers.some(k => k.name === r.name))];
  }, [roster, keepers]);

  const myTotal = useMemo(() => tradeMyPlayers.reduce((sum, p) => sum + (p.proj || 0), 0), [tradeMyPlayers]);
  const theirTotal = useMemo(() => tradeTheirPlayers.reduce((sum, p) => sum + (p.proj || 0), 0), [tradeTheirPlayers]);
  const diff = theirTotal - myTotal;
  const hasBoth = tradeMyPlayers.length > 0 && tradeTheirPlayers.length > 0;
  const verdict = diff > 30 ? "SMASH ACCEPT" : diff > 10 ? "LEAN ACCEPT" : diff > -10 ? "FAIR DEAL" : diff > -30 ? "LEAN DECLINE" : "HARD DECLINE";
  const verdictColor = diff > 30 ? "#00ff88" : diff > 10 ? "#88dd44" : diff > -10 ? "#ffaa00" : diff > -30 ? "#ff6b35" : "#ff4a4a";
  const hasKeeperRisk = tradeMyPlayers.some(p => p.isKeeper);

  const inputStyle = {
    background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6,
    color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none", width: "100%", boxSizing: "border-box",
  };

  const PlayerCard = ({ player, onRemove, side }) => (
    <div style={{
      background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 8,
      padding: "10px 12px", marginBottom: 6,
      display: "flex", alignItems: "center", justifyContent: "space-between",
    }}>
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ color: "#e0e6ed", fontSize: 13, fontWeight: 600 }}>{player.name}</span>
          {player.isKeeper && (
            <span style={{ background: "#ff6b3522", color: "#ff6b35", fontSize: 9, fontWeight: 700, padding: "1px 6px", borderRadius: 8 }}>KEEPER</span>
          )}
        </div>
        <div style={{ display: "flex", gap: 8, fontSize: 11, color: "#556677", marginTop: 2 }}>
          <span>{player.pos} • {player.team}</span>
          <span>PROJ: <span style={{ color: "#00b4ff", fontWeight: 600 }}>{player.proj}</span></span>
        </div>
      </div>
      <button onClick={onRemove} style={{
        background: "transparent", border: "1px solid #ff4a4a22", borderRadius: 6,
        color: "#ff4a4a88", padding: "4px 6px", cursor: "pointer", lineHeight: 1
      }}><Icons.Minus /></button>
    </div>
  );

  return (
    <div>
      <div style={{ color: "#8899aa", fontSize: 13, marginBottom: 20 }}>
        Build both sides of a trade and compare projected point values.
      </div>

      {/* Verdict Banner — only show when both sides populated */}
      {hasBoth && (
        <div style={{
          background: `${verdictColor}08`, border: `1px solid ${verdictColor}33`,
          borderRadius: 12, padding: "16px 20px", marginBottom: 20,
          display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12,
        }}>
          <div>
            <div style={{ color: verdictColor, fontSize: 22, fontWeight: 800 }}>{verdict}</div>
            <div style={{ color: "#8899aa", fontSize: 12, marginTop: 2 }}>
              Net: <span style={{ color: verdictColor, fontWeight: 700 }}>{diff > 0 ? "+" : ""}{diff.toFixed(1)} pts</span>
              {myTotal > 0 && <span style={{ color: "#556677" }}> ({((diff / myTotal) * 100).toFixed(1)}%)</span>}
            </div>
          </div>
          {hasKeeperRisk && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, color: "#ff6b35", fontSize: 12 }}>
              <Icons.Alert /> Trading away keeper(s)
            </div>
          )}
        </div>
      )}

      {/* Two-column trade builder */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        {/* I GIVE */}
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 12, padding: 16, display: "flex", flexDirection: "column" }}>
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12,
            paddingBottom: 10, borderBottom: "1px solid #1a2a3a"
          }}>
            <div style={{ color: "#ff6b35", fontSize: 12, fontWeight: 700, letterSpacing: 1 }}>I GIVE</div>
            <div style={{ color: "#ff6b35", fontSize: 14, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>
              {myTotal.toFixed(0)} pts
            </div>
          </div>
          <select value={myInput} onChange={e => {
            const player = allRosterPlayers.find(p => p.name === e.target.value);
            if (player && !tradeMyPlayers.some(p => p.name === player.name)) {
              setTradeMyPlayers(prev => [...prev, player]);
            }
            setMyInput("");
          }} style={{ ...inputStyle, marginBottom: 12 }}>
            <option value="">+ Add from roster...</option>
            {allRosterPlayers.filter(p => !tradeMyPlayers.some(tp => tp.name === p.name)).map((p, i) => (
              <option key={i} value={p.name}>{p.name} ({p.pos} • {p.proj})</option>
            ))}
          </select>
          <div style={{ flex: 1, minHeight: 80 }}>
            {tradeMyPlayers.map((p, i) => (
              <PlayerCard key={i} player={p} side="my" onRemove={() => setTradeMyPlayers(prev => prev.filter((_, j) => j !== i))} />
            ))}
            {tradeMyPlayers.length === 0 && (
              <div style={{ color: "#334455", fontSize: 12, textAlign: "center", padding: 20 }}>Select players from your roster</div>
            )}
          </div>
        </div>

        {/* I RECEIVE */}
        <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 12, padding: 16, display: "flex", flexDirection: "column" }}>
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12,
            paddingBottom: 10, borderBottom: "1px solid #1a2a3a"
          }}>
            <div style={{ color: "#00ff88", fontSize: 12, fontWeight: 700, letterSpacing: 1 }}>I RECEIVE</div>
            <div style={{ color: "#00ff88", fontSize: 14, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace" }}>
              {theirTotal.toFixed(0)} pts
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
            <input placeholder="Name" value={theirInput.name} onChange={e => setTheirInput(p => ({ ...p, name: e.target.value }))}
              style={inputStyle} />
            <input placeholder="Proj" type="number" value={theirInput.proj || ""} onChange={e => setTheirInput(p => ({ ...p, proj: parseFloat(e.target.value) || 0 }))}
              style={inputStyle} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 8 }}>
            <input placeholder="Pos" value={theirInput.pos} onChange={e => setTheirInput(p => ({ ...p, pos: e.target.value }))}
              style={inputStyle} />
            <input placeholder="Team" value={theirInput.team} onChange={e => setTheirInput(p => ({ ...p, team: e.target.value }))}
              style={inputStyle} />
          </div>
          <button onClick={() => {
            if (theirInput.name) {
              setTradeTheirPlayers(prev => [...prev, { ...theirInput }]);
              setTheirInput({ name: "", pos: "", team: "", proj: 0 });
            }
          }} style={{
            background: "#00ff8815", border: "1px solid #00ff8833", borderRadius: 6,
            color: "#00ff88", padding: "6px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600, marginBottom: 12, alignSelf: "flex-start"
          }}>+ Add Player</button>
          <div style={{ flex: 1, minHeight: 80 }}>
            {tradeTheirPlayers.map((p, i) => (
              <PlayerCard key={i} player={p} side="their" onRemove={() => setTradeTheirPlayers(prev => prev.filter((_, j) => j !== i))} />
            ))}
            {tradeTheirPlayers.length === 0 && (
              <div style={{ color: "#334455", fontSize: 12, textAlign: "center", padding: 20 }}>Enter players you'd receive</div>
            )}
          </div>
        </div>
      </div>

      {(tradeMyPlayers.length > 0 || tradeTheirPlayers.length > 0) && (
        <button onClick={() => { setTradeMyPlayers([]); setTradeTheirPlayers([]); }} style={{
          background: "transparent", border: "1px solid #334455", borderRadius: 8,
          color: "#667788", padding: "8px 16px", cursor: "pointer", fontSize: 12, width: "100%"
        }}>Clear Trade</button>
      )}
    </div>
  );
}

// ============================================================
// INTEL FEED TAB
// ============================================================
function IntelTab() {
  const ctx = useContext(AppCtx);
  const { keepers, setKeepers, keeperWatchlist, setKeeperWatchlist, roster, setRoster, draftPool, setDraftPool, draftPick, setDraftPick, draftLog, setDraftLog, watchlist, setWatchlist, notes, setNotes, news, setNews, searchTerm, setSearchTerm, tradeMyPlayers, setTradeMyPlayers, tradeTheirPlayers, setTradeTheirPlayers } = ctx;

  const [searchName, setSearchName] = useState("");
  const [searchLoading, setSearchLoading] = useState(false);
  const [searchResult, setSearchResult] = useState(null);
  const [newItem, setNewItem] = useState({ player: "", source: "", type: "riser", note: "" });

  const typeColors = {
    riser: { bg: "#00ff8822", color: "#00ff88", label: "📈 RISER" },
    faller: { bg: "#ff4a4a22", color: "#ff4a4a", label: "📉 FALLER" },
    news: { bg: "#00b4ff22", color: "#00b4ff", label: "📰 NEWS" },
    pickup: { bg: "#ffaa0022", color: "#ffaa00", label: "🎯 PICKUP" },
    injury: { bg: "#ff6b3522", color: "#ff6b35", label: "🚑 INJURY" },
    analysis: { bg: "#9966ff22", color: "#9966ff", label: "🔬 ANALYSIS" },
  };

  const searchPlayer = async () => {
    if (!searchName.trim()) return;
    setSearchLoading(true);
    setSearchResult(null);
    try {
      const response = await fetch("/api/intel", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ playerName: searchName.trim() })
      });
      
      if (!response.ok) {
        const errText = await response.text().catch(() => "unknown");
        throw new Error(`HTTP ${response.status}: ${errText.slice(0, 300)}`);
      }
      
      const data = await response.json();
      
      let parsed = data.parsed || null;
      let rawText = data.rawText || null;

      // If raw text fallback (JSON parse failed server-side)
      if (rawText && !parsed) {
        setSearchResult({ player: searchName.trim(), parsed: null, rawText, date: new Date().toISOString() });
        return;
      }

      // Cross-reference with local data to correct hallucinations
      const localMatch = [...keepers, ...keeperWatchlist, ...roster].find(
        p => p.name.toLowerCase().includes(searchName.trim().toLowerCase()) || 
             searchName.trim().toLowerCase().includes(p.name.toLowerCase())
      );
      if (localMatch && parsed) {
        if (localMatch.pos) parsed.pos = localMatch.pos;
        if (localMatch.age) parsed.age = localMatch.age;
        if (localMatch.team) parsed.team = localMatch.team;
        if (localMatch.proj) parsed.proj_points = localMatch.proj;
        parsed.local_override = true;
      }

      setSearchResult({ player: searchName.trim(), parsed, rawText: null, date: new Date().toISOString() });
    } catch (err) {
      console.error("Search error:", err);
      setSearchResult({ 
        player: searchName.trim(), 
        parsed: null,
        rawText: `Search error: ${err.message}\n\nQuick links for manual research:\n• rotowire.com/baseball/player/${searchName.trim().toLowerCase().replace(/[.\s]+/g, '-')}\n• fantasypros.com/mlb — Expert consensus\n• pitcherlist.com — SP analysis\n• nbcsports.com/fantasy/baseball — Rotoworld\n• espn.com/fantasy/baseball — Cockcroft & Karabell`, 
        date: new Date().toISOString() 
      });
    }
    setSearchLoading(false);
  };

  const SentimentBadge = ({ level, reason, label }) => {
    const colors = { positive: "#00ff88", neutral: "#ffaa00", negative: "#ff4a4a" };
    const icons = { positive: "▲", neutral: "●", negative: "▼" };
    const c = colors[level] || colors.neutral;
    return (
      <div style={{ flex: 1 }}>
        <div style={{ color: "#667788", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>{label}</div>
        <div style={{
          background: `${c}11`, border: `1px solid ${c}33`, borderRadius: 8, padding: "8px 10px",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ color: c, fontSize: 14, fontWeight: 800 }}>{icons[level] || "●"}</span>
            <span style={{ color: c, fontSize: 12, fontWeight: 700, textTransform: "uppercase" }}>{level || "N/A"}</span>
          </div>
          {reason && <div style={{ color: "#8899aa", fontSize: 10, marginTop: 4, lineHeight: 1.4 }}>{reason}</div>}
        </div>
      </div>
    );
  };

  const RoleSecurityGauge = ({ level, reason }) => {
    const colors = { green: "#00ff88", yellow: "#ffaa00", red: "#ff4a4a" };
    const labels = { green: "LOCKED IN", yellow: "MONITOR", red: "AT RISK" };
    const c = colors[level] || colors.yellow;
    return (
      <div>
        <div style={{ color: "#667788", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>ROLE SECURITY</div>
        <div style={{
          background: `${c}11`, border: `1px solid ${c}33`, borderRadius: 8, padding: "10px 12px",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <div style={{
              width: 10, height: 10, borderRadius: "50%", background: c,
              boxShadow: `0 0 8px ${c}66`,
            }} />
            <span style={{ color: c, fontSize: 13, fontWeight: 800 }}>{labels[level] || "UNKNOWN"}</span>
          </div>
          {reason && <div style={{ color: "#8899aa", fontSize: 11, lineHeight: 1.4 }}>{reason}</div>}
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Player Search — main feature */}
      <div style={{
        background: "linear-gradient(135deg, #001a2a, #0d1520)",
        border: "1px solid #00b4ff33", borderRadius: 12, padding: 20, marginBottom: 24,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <span style={{ fontSize: 16 }}>🔍</span>
          <h3 style={{ color: "#00b4ff", margin: 0, fontSize: 14, fontWeight: 700, letterSpacing: 1 }}>PLAYER INTEL SEARCH</h3>
        </div>
        <div style={{ color: "#8899aa", fontSize: 12, marginBottom: 12 }}>
          Search any player for latest news, expert analysis, injury updates, and ROS outlook from Rotowire, CBS, ESPN, Pitcher List, and more.
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input
            placeholder="Enter player name (e.g. Garrett Crochet)..."
            value={searchName}
            onChange={e => setSearchName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && searchPlayer()}
            style={{
              flex: 1, background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 8,
              color: "#e0e6ed", padding: "10px 14px", fontSize: 14, outline: "none",
            }}
          />
          <button onClick={searchPlayer} disabled={searchLoading || !searchName.trim()} style={{
            background: searchLoading ? "#334455" : "#00b4ff22",
            border: `1px solid ${searchLoading ? "#334455" : "#00b4ff66"}`,
            borderRadius: 8, color: searchLoading ? "#667788" : "#00b4ff",
            padding: "10px 20px", cursor: searchLoading ? "wait" : "pointer",
            fontSize: 13, fontWeight: 700, letterSpacing: 0.5, minWidth: 100,
          }}>
            {searchLoading ? "Searching..." : "⚡ SEARCH"}
          </button>
        </div>

        {/* Search Result */}
        {searchResult && (
          <div style={{
            background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10,
            padding: 16, marginTop: 16,
          }}>
            {searchResult.parsed ? (() => {
              const p = searchResult.parsed;
              const verdictColors = { RISER: "#00ff88", FALLER: "#ff4a4a", HOLD: "#ffaa00" };
              const vc = verdictColors[p.verdict] || "#ffaa00";
              return (
                <>
                  {/* Header */}
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ color: "#00b4ff", fontSize: 10, fontWeight: 700, background: "#00b4ff22", padding: "2px 8px", borderRadius: 10 }}>INTEL REPORT</span>
                      <span style={{ color: "#e0e6ed", fontWeight: 700, fontSize: 16 }}>{p.name || searchResult.player}</span>
                      {p.pos && <span style={{ color: "#00b4ff", fontSize: 10, fontWeight: 600 }}>{p.pos}</span>}
                      {p.team && <span style={{ color: "#556677", fontSize: 10 }}>{p.team}</span>}
                      {p.age && <span style={{ color: "#8899aa", fontSize: 10 }}>Age {p.age}</span>}
                      {p.local_override && <span style={{ color: "#ffaa00", fontSize: 8, fontWeight: 700, background: "#ffaa0022", padding: "1px 5px", borderRadius: 4 }}>LOCAL DATA</span>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {p.proj_points && (
                        <span style={{ color: "#00b4ff", fontSize: 12, fontWeight: 700, background: "#00b4ff11", padding: "3px 8px", borderRadius: 6 }}>
                          {p.proj_points} pts
                        </span>
                      )}
                      <span style={{
                        color: vc, fontSize: 11, fontWeight: 800, background: `${vc}22`,
                        padding: "3px 10px", borderRadius: 10, letterSpacing: 1,
                      }}>
                        {p.verdict === "RISER" ? "📈" : p.verdict === "FALLER" ? "📉" : "📊"} {p.verdict}
                      </span>
                    </div>
                  </div>

                  {/* Tactical Dashboard Row */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
                    <SentimentBadge level={p.sentiment_3day} reason={p.sentiment_3day_reason} label="LAST 3 DAYS" />
                    <SentimentBadge level={p.sentiment_week} reason={p.sentiment_week_reason} label="LAST WEEK" />
                    <RoleSecurityGauge level={p.role_security} reason={p.role_security_reason} />
                  </div>

                  {/* Key Risk / Upside */}
                  {(p.key_risk || p.key_upside) && (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                      {p.key_upside && (
                        <div style={{ background: "#00ff8808", border: "1px solid #00ff8822", borderRadius: 8, padding: "8px 10px" }}>
                          <div style={{ color: "#00ff88", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginBottom: 3 }}>⬆ KEY UPSIDE</div>
                          <div style={{ color: "#b8c5d4", fontSize: 11, lineHeight: 1.4 }}>{p.key_upside}</div>
                        </div>
                      )}
                      {p.key_risk && (
                        <div style={{ background: "#ff4a4a08", border: "1px solid #ff4a4a22", borderRadius: 8, padding: "8px 10px" }}>
                          <div style={{ color: "#ff4a4a", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginBottom: 3 }}>⬇ KEY RISK</div>
                          <div style={{ color: "#b8c5d4", fontSize: 11, lineHeight: 1.4 }}>{p.key_risk}</div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Strategic Analysis */}
                  <div style={{
                    background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 8, padding: 12, marginBottom: 12,
                  }}>
                    <div style={{ color: "#667788", fontSize: 9, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>STRATEGIC ANALYSIS</div>
                    <div style={{ color: "#b8c5d4", fontSize: 12, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>
                      {p.strategic}
                    </div>
                  </div>

                  <button onClick={() => {
                    setNews(prev => [{
                      player: p.name || searchResult.player, source: "AI Intel", type: p.verdict === "RISER" ? "riser" : p.verdict === "FALLER" ? "faller" : "analysis",
                      note: `[${p.verdict}] Role: ${p.role_security?.toUpperCase()} | 3-Day: ${p.sentiment_3day} | Week: ${p.sentiment_week}\nUpside: ${p.key_upside || "—"}\nRisk: ${p.key_risk || "—"}\n\n${p.strategic}`,
                      date: searchResult.date
                    }, ...prev]);
                  }} style={{
                    background: "#9966ff15", border: "1px solid #9966ff33", borderRadius: 6,
                    color: "#9966ff", padding: "6px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600,
                  }}>💾 Save to Intel Feed</button>
                </>
              );
            })() : (
              <>
                {/* Fallback for raw text / errors */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "#00b4ff", fontSize: 10, fontWeight: 700, background: "#00b4ff22", padding: "2px 8px", borderRadius: 10 }}>INTEL REPORT</span>
                    <span style={{ color: "#e0e6ed", fontWeight: 700, fontSize: 15 }}>{searchResult.player}</span>
                  </div>
                  <span style={{ color: "#334455", fontSize: 10 }}>{new Date(searchResult.date).toLocaleString()}</span>
                </div>
                <div style={{ color: "#b8c5d4", fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>
                  {searchResult.rawText}
                </div>
                <button onClick={() => {
                  setNews(prev => [{
                    player: searchResult.player, source: "AI Intel", type: "analysis",
                    note: searchResult.rawText, date: searchResult.date
                  }, ...prev]);
                }} style={{
                  background: "#9966ff15", border: "1px solid #9966ff33", borderRadius: 6,
                  color: "#9966ff", padding: "6px 14px", cursor: "pointer", fontSize: 11, fontWeight: 600, marginTop: 12,
                }}>💾 Save to Intel Feed</button>
              </>
            )}
          </div>
        )}
      </div>

      {/* Manual Intel Entry */}
      <div style={{ background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10, padding: 16, marginBottom: 20 }}>
        <div style={{ color: "#667788", fontSize: 11, fontWeight: 600, letterSpacing: 1, marginBottom: 10 }}>ADD MANUAL INTEL</div>
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 8 }}>
          <input placeholder="Player name" value={newItem.player} onChange={e => setNewItem(p => ({ ...p, player: e.target.value }))}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
          <select value={newItem.type} onChange={e => setNewItem(p => ({ ...p, type: e.target.value }))}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }}>
            {Object.entries(typeColors).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
          <input placeholder="Source" value={newItem.source} onChange={e => setNewItem(p => ({ ...p, source: e.target.value }))}
            style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 13, outline: "none" }} />
        </div>
        <textarea placeholder="Notes / analysis / context..." value={newItem.note}
          onChange={e => setNewItem(p => ({ ...p, note: e.target.value }))}
          style={{ background: "#0d1520", border: "1px solid #1a2a3a", borderRadius: 6, color: "#e0e6ed", padding: "8px 12px", fontSize: 12, width: "100%", marginTop: 8, outline: "none", minHeight: 60, resize: "vertical", boxSizing: "border-box" }} />
        <button onClick={() => {
          if (newItem.player) {
            setNews(prev => [{ ...newItem, date: new Date().toISOString() }, ...prev]);
            setNewItem({ player: "", source: "", type: "riser", note: "" });
          }
        }} style={{
          background: "#00b4ff22", border: "1px solid #00b4ff44", borderRadius: 6,
          color: "#00b4ff", padding: "8px 16px", cursor: "pointer", fontSize: 12, fontWeight: 600, marginTop: 10
        }}>Add Intel</button>
      </div>

      {/* Saved Intel Feed */}
      {news.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: "#556677" }}>
          Search for players above or add manual intel. All entries are saved here.
        </div>
      ) : (
        <div>
          <div style={{ color: "#667788", fontSize: 11, fontWeight: 600, letterSpacing: 1, marginBottom: 10 }}>SAVED INTEL ({news.length})</div>
          {news.map((item, i) => {
            const tc = typeColors[item.type] || typeColors.news;
            return (
              <div key={i} style={{
                background: tc.bg, border: `1px solid ${tc.color}33`,
                borderRadius: 10, padding: "12px 16px", marginBottom: 8
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: tc.color, fontSize: 10, fontWeight: 700, background: tc.bg, padding: "2px 8px", borderRadius: 10 }}>
                      {tc.label}
                    </span>
                    <span style={{ color: "#e0e6ed", fontWeight: 700, fontSize: 14 }}>{item.player}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    {item.source && <span style={{ color: "#556677", fontSize: 10 }}>{item.source}</span>}
                    <span style={{ color: "#334455", fontSize: 10 }}>
                      {new Date(item.date).toLocaleDateString()}
                    </span>
                    <button onClick={() => setNews(prev => prev.filter((_, j) => j !== i))} style={{
                      background: "transparent", border: "none", color: "#ff4a4a55", cursor: "pointer", padding: 2
                    }}><Icons.Trash /></button>
                  </div>
                </div>
                {item.note && <div style={{ color: "#8899aa", fontSize: 12, lineHeight: 1.5, whiteSpace: "pre-wrap", maxHeight: 150, overflow: "auto" }}>{item.note}</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* Quick Notes */}
      <div style={{ marginTop: 24 }}>
        <h3 style={{ color: "#667788", fontSize: 13, fontWeight: 600, letterSpacing: 1, marginBottom: 10 }}>SCRATCH PAD</h3>
        <textarea value={notes} onChange={e => setNotes(e.target.value)}
          placeholder="Quick notes, draft strategy thoughts, trade targets..."
          style={{
            background: "#0a111a", border: "1px solid #1a2a3a", borderRadius: 10,
            color: "#e0e6ed", padding: 14, fontSize: 13, width: "100%", minHeight: 120,
            outline: "none", resize: "vertical", lineHeight: 1.6, boxSizing: "border-box"
          }} />
      </div>
    </div>
  );
}

  useEffect(() => { if (loaded) saveData(STORAGE_KEYS.draftLog, draftLog); }, [draftLog, loaded]);

  useEffect(() => { if (loaded) saveData(STORAGE_KEYS.news, news); }, [news, loaded]);
  useEffect(() => { if (loaded) saveData(STORAGE_KEYS.watchlist, watchlist); }, [watchlist, loaded]);
  useEffect(() => { if (loaded) saveData(STORAGE_KEYS.keepers, keepers); }, [keepers, loaded]);

    { id: "trade", label: "Trade Eval", icon: <Icons.Swap /> },
